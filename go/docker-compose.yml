# version: "3.9"

services:

  postgres:
    image: postgres:18-alpine
    container_name: neneloga-db
    ports:
      - "5430:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    # restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
      # - redis
      # - postgres

# docker exec neneloga-db psql -U steve -d neneloga -c "\dt"


  redis:
    image: redis:8.0-alpine
    container_name: neneloga-redis
    ports:
      - "6380:6379" # right is container port
    # volumes:
    #   - redis_data:/data
    networks:
      - neneloga
    # restart: unless-stopped


volumes:
  # sqlite_data:
  postgres_data:
  # media_data:
    # redis_data:

networks:
  neneloga:
    driver: bridge
